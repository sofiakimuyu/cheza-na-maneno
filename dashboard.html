<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>Matatu ya Maneno — Dashboard</title>
<style>
  :root{
    --bg:#12161c; --panel:#1a2029; --panel-2:#222a35; --line:#2c3644;
    --ink:#e8edf4; --ink-soft:#8b99ad;
    --accent:#F4802B; --accent-2:#2A9D8F; --warn:#E63946;
    --mono:ui-monospace,SFMono-Regular,Menlo,monospace;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--bg); color:var(--ink);
    font-family:system-ui,-apple-system,"Segoe UI",sans-serif; font-size:15px; line-height:1.5;}
  .wrap{max-width:1080px; margin:0 auto; padding:24px 18px 60px;}
  h1{font-size:1.4rem; margin:0;}
  h2{font-size:.95rem; text-transform:uppercase; letter-spacing:.06em;
     color:var(--ink-soft); margin:32px 0 10px; font-weight:700;}
  .head{display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;}
  .muted{color:var(--ink-soft); font-size:.85rem;}
  button{font:inherit; cursor:pointer; border-radius:8px; border:1px solid var(--line);
    background:var(--panel-2); color:var(--ink); padding:8px 14px;}
  button.primary{background:var(--accent); border-color:var(--accent); color:#1a1206; font-weight:700;}
  button:disabled{opacity:.5; cursor:default;}
  input{font:inherit; background:var(--panel-2); color:var(--ink); border:1px solid var(--line);
    border-radius:8px; padding:10px 12px; width:100%;}

  /* login */
  .login{max-width:340px; margin:14vh auto; background:var(--panel); border:1px solid var(--line);
    border-radius:14px; padding:24px;}
  .login h1{font-size:1.15rem; margin-bottom:4px;}
  .login label{display:block; font-size:.8rem; color:var(--ink-soft); margin:14px 0 5px;}
  .err{color:var(--warn); font-size:.85rem; min-height:1.2em; margin-top:10px;}

  /* stat tiles */
  .tiles{display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px;}
  .tile{background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:14px 16px;}
  .tile .n{font-size:1.9rem; font-weight:800; font-variant-numeric:tabular-nums; line-height:1.15;}
  .tile .k{font-size:.78rem; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.04em;}

  /* table */
  table{width:100%; border-collapse:collapse; background:var(--panel);
    border:1px solid var(--line); border-radius:12px; overflow:hidden;}
  th,td{padding:9px 12px; text-align:right; border-bottom:1px solid var(--line); font-variant-numeric:tabular-nums;}
  th:first-child,td:first-child{text-align:left; font-variant-numeric:normal;}
  th{font-size:.74rem; text-transform:uppercase; letter-spacing:.05em; color:var(--ink-soft);
     background:var(--panel-2); font-weight:700;}
  tr:last-child td{border-bottom:none;}
  .scroll{overflow-x:auto;}
  .bad{color:var(--warn); font-weight:700;}

  /* chart */
  .chart{background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:16px;}
  .chart svg{width:100%; height:190px; display:block;}
  .legend{display:flex; gap:16px; font-size:.8rem; color:var(--ink-soft); margin-top:8px;}
  .legend i{display:inline-block; width:10px; height:10px; border-radius:2px; margin-right:5px;}
  .empty{color:var(--ink-soft); padding:18px; background:var(--panel);
    border:1px solid var(--line); border-radius:12px;}
</style>
</head>
<body>

<!-- LOGIN ------------------------------------------------------------- -->
<div id="loginView" class="login" hidden>
  <h1>Dashboard</h1>
  <div class="muted">Matatu ya Maneno — private</div>
  <label for="email">Email</label>
  <input id="email" type="email" autocomplete="username">
  <label for="pw">Password</label>
  <input id="pw" type="password" autocomplete="current-password">
  <div class="err" id="loginErr"></div>
  <button class="primary" id="loginBtn" style="width:100%;margin-top:14px">Sign in</button>
</div>

<!-- DASHBOARD --------------------------------------------------------- -->
<div id="dashView" class="wrap" hidden>
  <div class="head">
    <div>
      <h1>Matatu ya Maneno</h1>
      <div class="muted" id="who"></div>
    </div>
    <div style="display:flex;gap:8px">
      <button id="refreshBtn">Refresh</button>
      <button id="outBtn">Sign out</button>
    </div>
  </div>

  <h2>Players</h2>
  <div class="tiles" id="tiles"></div>

  <h2>Last 30 days</h2>
  <div class="chart" id="chart"></div>

  <h2>Level funnel</h2>
  <div class="muted" style="margin-bottom:8px">
    Where players stop. A high drop-off is usually a puzzle that is too hard — cross-check the hint column.
  </div>
  <div class="scroll" id="funnel"></div>

  <h2>Leaderboard</h2>
  <div class="scroll" id="board"></div>
</div>

<div id="bootErr" class="wrap" hidden></div>

<script src="vendor/supabase.js"></script>
<script src="supabase-config.js"></script>
<script>
/* The page itself is public (it ships with the game on GitHub Pages), but the
   DATA is not: every dash_* function re-checks is_admin() server-side, so a
   non-admin session gets "not authorised" no matter what it sends. Access is
   controlled in the database, never in this file. */
const CFG = window.SUPABASE_CONFIG || {};
const $ = (id)=> document.getElementById(id);
const esc = (s)=> String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const num = (n)=> Number(n||0).toLocaleString();

if(!CFG.url || !CFG.anonKey){
  $("bootErr").hidden = false;
  $("bootErr").innerHTML = `<div class="empty">Supabase is not configured. Fill in <code>supabase-config.js</code>, then reload.</div>`;
} else {
  boot();
}

function boot(){
  const db = window.supabase.createClient(CFG.url, CFG.anonKey);

  async function route(){
    const { data:{ session } } = await db.auth.getSession();
    if(!session){ showLogin(); return; }
    $("who").textContent = session.user.email || "";
    await load();
  }

  function showLogin(err){
    $("dashView").hidden = true;
    $("loginView").hidden = false;
    $("loginErr").textContent = err || "";
  }

  $("loginBtn").onclick = async ()=>{
    const btn = $("loginBtn");
    btn.disabled = true; $("loginErr").textContent = "";
    const { error } = await db.auth.signInWithPassword({
      email: $("email").value.trim(), password: $("pw").value,
    });
    btn.disabled = false;
    if(error){ $("loginErr").textContent = error.message; return; }
    $("pw").value = "";
    route();
  };
  $("pw").addEventListener("keydown", e=>{ if(e.key==="Enter") $("loginBtn").click(); });

  $("outBtn").onclick = async ()=>{ await db.auth.signOut(); showLogin(); };
  $("refreshBtn").onclick = ()=> load();

  async function load(){
    $("loginView").hidden = true;
    $("dashView").hidden = false;

    const [totals, daily, funnel, board] = await Promise.all([
      db.rpc("dash_totals"), db.rpc("dash_daily", { days: 30 }),
      db.rpc("dash_funnel"), db.rpc("dash_leaderboard", { lim: 100 }),
    ]);

    // A non-admin gets "not authorised" from every function. Say so plainly
    // rather than rendering a confusing page full of zeroes.
    const denied = [totals, daily, funnel, board].find(r => r.error);
    if(denied){
      await db.auth.signOut();
      showLogin(/not authoris/i.test(denied.error.message)
        ? "That account is not an admin. Add it to the admins table."
        : denied.error.message);
      return;
    }

    renderTiles(totals.data && totals.data[0]);
    renderChart(daily.data || []);
    renderFunnel(funnel.data || []);
    renderBoard(board.data || []);
  }

  function renderTiles(t){
    t = t || {};
    const tiles = [
      ["Total players",   t.total_players],
      ["Active today",    t.players_today],
      ["New today",       t.new_today],
      ["Active this week",t.players_7d],
    ];
    $("tiles").innerHTML = tiles.map(([k,v])=>
      `<div class="tile"><div class="n">${num(v)}</div><div class="k">${k}</div></div>`).join("");
  }

  function renderChart(rows){
    if(!rows.length){ $("chart").innerHTML = `<div class="muted">No activity yet.</div>`; return; }
    const W = 720, H = 170, pad = 26;
    const max = Math.max(1, ...rows.map(r => Math.max(+r.new_players, +r.active_players)));
    const bw = (W - pad*2) / rows.length;
    const y = (v)=> H - pad - (v / max) * (H - pad*2);

    const bars = rows.map((r,i)=>{
      const x = pad + i*bw;
      const a = +r.active_players, n = +r.new_players;
      return `<rect x="${x+1}" y="${y(a)}" width="${Math.max(1,bw-2)}" height="${H-pad-y(a)}" fill="var(--accent-2)" opacity=".55"/>
              <rect x="${x+1}" y="${y(n)}" width="${Math.max(1,bw-2)}" height="${H-pad-y(n)}" fill="var(--accent)"/>`;
    }).join("");

    const first = rows[0].day, last = rows[rows.length-1].day;
    $("chart").innerHTML = `
      <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" role="img"
           aria-label="Daily new and active players over the last 30 days">
        <line x1="${pad}" y1="${H-pad}" x2="${W-pad}" y2="${H-pad}" stroke="var(--line)"/>
        <text x="${pad}" y="16" fill="var(--ink-soft)" font-size="11">${max}</text>
        ${bars}
      </svg>
      <div class="legend">
        <span><i style="background:var(--accent)"></i>New</span>
        <span><i style="background:var(--accent-2);opacity:.55"></i>Active</span>
        <span style="margin-left:auto">${first} → ${last}</span>
      </div>`;
  }

  function renderFunnel(rows){
    if(!rows.length){ $("funnel").innerHTML = `<div class="empty">No level events yet.</div>`; return; }
    $("funnel").innerHTML = `<table><thead><tr>
        <th>Level</th><th>Started</th><th>Completed</th><th>Drop-off</th><th>Hints</th>
      </tr></thead><tbody>${rows.map(r=>{
        const started = +r.started, done = +r.completed;
        const drop = started ? Math.round((1 - done/started) * 100) : 0;
        return `<tr>
          <td>${r.level_id}</td><td>${num(started)}</td><td>${num(done)}</td>
          <td class="${drop >= 40 ? "bad" : ""}">${started ? drop + "%" : "—"}</td>
          <td>${num(r.hints)}</td></tr>`;
      }).join("")}</tbody></table>`;
  }

  function renderBoard(rows){
    if(!rows.length){ $("board").innerHTML = `<div class="empty">No players yet.</div>`; return; }
    $("board").innerHTML = `<table><thead><tr>
        <th>#</th><th>Player</th><th>Levels</th><th>Sarafu</th><th>Bonus</th><th>Last seen</th>
      </tr></thead><tbody>${rows.map(r=>`
        <tr><td>${r.rank}</td><td>${esc(r.username)}</td>
        <td>${num(r.levels_done)}</td><td>${num(r.sarafu)}</td><td>${num(r.bonus_words)}</td>
        <td>${String(r.last_seen_at || "").slice(0,10)}</td></tr>`).join("")}</tbody></table>`;
  }

  route();
}
</script>
</body>
</html>
