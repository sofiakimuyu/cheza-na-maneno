<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#E63946" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Matatu ya Maneno" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="icon.svg" />
<title>Matatu ya Maneno</title>

<style>
/* ============================ THEME / PALETTE ============================ */
:root{
  --red:#E63946; --red-d:#c62f3c;
  --yellow:#FFB703; --yellow-d:#e5a300;
  --green:#2A9D8F; --green-d:#218276;
  --blue:#1D3557; --blue-2:#2b4a78;
  --orange:#F4802B; --orange-d:#e06a15;
  --cream:#FFF6E9; --cream-2:#ffeccf;
  --ink:#241a12; --ink-soft:#5c4a38;
  --road:#3a3a44; --road-line:#ffd23f;
  --tile:#fff; --tile-sh:#c9b79a;
  --ok:#2A9D8F; --shadow:0 6px 0 rgba(0,0,0,.18);
  --safe-b: env(safe-area-inset-bottom, 0px);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; height:100%;}
body{
  font-family:"Baloo 2", "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
  color:var(--ink);
  background:
    radial-gradient(120% 80% at 50% -10%, #7cc5ff 0%, #a8dcff 30%, transparent 60%),
    linear-gradient(180deg,#ffe8bf 0%, #ffd79a 42%, #f7b267 100%);
  background-attachment:fixed;
  overflow:hidden;
  user-select:none; -webkit-user-select:none;
  touch-action:manipulation;
}
button{font-family:inherit; cursor:pointer; border:none; color:inherit;}
.hidden{display:none !important;}

/* Bold "hand-painted poster" heading font stack fallback */
h1,h2,.poster{font-weight:800; letter-spacing:.5px;}

/* ============================ APP SHELL ============================ */
#app{position:fixed; inset:0; display:flex; flex-direction:column; overflow:hidden;}
.screen{position:absolute; inset:0; display:flex; flex-direction:column;
  animation:fadeIn .25s ease; overflow:hidden;}
@keyframes fadeIn{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;}}

/* ============================ ROAD SCENERY ============================
   Every screen sits on a photo of a Kenyan road, swapped as the player works
   down the route (see setScene). Two photo layers cross-fade so a scene change
   never blinks. `.scrim` is the veil that keeps the UI readable on top; how
   heavy it is depends on how busy the screen above it is. */
#scene{position:fixed; inset:0; z-index:-2; overflow:hidden;
  background:linear-gradient(180deg,#ffe8bf 0%, #ffd79a 42%, #f7b267 100%);}
#scene .photo{position:absolute; inset:0; background-size:cover; background-position:center;
  opacity:0; transition:opacity .55s ease, filter .45s ease, transform .45s ease;}
#scene .photo.on{opacity:var(--photo-op,1);}
#scene .scrim{position:absolute; inset:0; transition:background .45s ease;}

/* Open road — title, kituo intro, arrival. A soft glow sits under the centred
   content so copy always lands on something light, while the edges of the
   frame stay vivid. Some of these photos (city gridlock) are very busy, so the
   glow does the readability work a flat veil couldn't without killing them. */
#scene[data-veil="open"] .scrim{
  background:
    radial-gradient(125% 58% at 50% 46%, rgba(255,246,233,.74) 0%,
      rgba(255,246,233,.34) 54%, rgba(255,246,233,0) 78%),
    linear-gradient(180deg, rgba(255,246,233,.60) 0%, rgba(255,246,233,.22) 34%,
      rgba(255,228,188,.28) 64%, rgba(52,34,16,.50) 100%);}

/* gameplay — the busiest screen, so the road drops back and softens */
#scene[data-veil="play"] .photo{filter:blur(3px) saturate(.85); transform:scale(1.06);}
#scene[data-veil="play"] .scrim{
  background:linear-gradient(180deg, rgba(255,246,233,.82) 0%, rgba(255,246,233,.72) 38%,
    rgba(255,230,195,.76) 100%);}

/* end of the line — keeps the old navy mood, with Mombasa showing through */
#scene[data-veil="dusk"] .scrim{
  background:linear-gradient(180deg, rgba(29,53,87,.60) 0%, rgba(29,53,87,.80) 100%);}

/* The journey map carries no veil of its own — the 80% photo opacity alone
   softens it. It sits on near-white rather than the warm gradient so that 20%
   fades the map toward paper instead of tinting it orange, and it's sized to
   `contain` so the whole country is visible behind the route. */
#scene[data-veil="map"]{background:#fdf7ec;}
#scene[data-veil="map"] .photo{background-size:contain; background-repeat:no-repeat;}
#scene[data-veil="map"] .scrim{background:transparent;}

/* chunky buttons */
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:.5em;
  background:var(--yellow); color:var(--ink);
  border-radius:16px; padding:14px 22px; font-size:1.15rem; font-weight:800;
  box-shadow:0 5px 0 var(--yellow-d); transition:transform .05s, box-shadow .05s;
}
.btn:active{transform:translateY(4px); box-shadow:0 1px 0 var(--yellow-d);}
.btn.red{background:var(--red); color:#fff; box-shadow:0 5px 0 var(--red-d);}
.btn.red:active{box-shadow:0 1px 0 var(--red-d);}
.btn.green{background:var(--green); color:#fff; box-shadow:0 5px 0 var(--green-d);}
.btn.green:active{box-shadow:0 1px 0 var(--green-d);}
.btn.blue{background:var(--blue); color:#fff; box-shadow:0 5px 0 #12203a;}
.btn.ghost{background:rgba(255,255,255,.7); box-shadow:0 5px 0 rgba(0,0,0,.12);}
.btn.sm{padding:9px 14px; font-size:.95rem; border-radius:12px;}

/* ============================ HOME ============================ */
#home{align-items:center; justify-content:center; text-align:center; padding:24px; gap:6px;}
#home .titlewrap{margin-bottom:6px;}
#home h1{
  font-size:clamp(2.3rem,11vw,3.4rem); margin:0; line-height:.95;
  color:#fff; -webkit-text-stroke:2px var(--blue);
  text-shadow:4px 4px 0 var(--red), 8px 8px 0 rgba(0,0,0,.15);
  transform:rotate(-3deg);
}
#home .sub{font-weight:700; color:var(--blue); font-size:1rem; margin-top:14px;
  text-shadow:0 1px 3px rgba(255,246,233,.9);}
#home .homebtns{display:flex; flex-direction:column; gap:12px; width:min(340px,86vw); margin-top:14px;}
.home-matatu{width:min(360px,90vw); margin:6px 0 2px;}
/* sits on the darkened foot of the scenery, so it reads light */
.credit{position:absolute; bottom:calc(10px + var(--safe-b)); font-size:.72rem;
  color:rgba(255,255,255,.92); text-shadow:0 1px 3px rgba(0,0,0,.55);}

/* ============================ TOP HUD ============================ */
.hud{display:flex; align-items:center; gap:8px; padding:calc(8px + env(safe-area-inset-top,0px)) 12px 8px; }
.hud .icon-btn{width:44px; height:44px; border-radius:14px; background:rgba(255,255,255,.85);
  box-shadow:0 4px 0 rgba(0,0,0,.12); font-size:1.3rem; display:flex; align-items:center; justify-content:center;}
.hud .icon-btn:active{transform:translateY(3px); box-shadow:0 1px 0 rgba(0,0,0,.12);}
.hud .center{flex:1; text-align:center; min-width:0;}
.hud .kicker{font-size:.7rem; font-weight:700; color:var(--blue); text-transform:uppercase; letter-spacing:1px;}
.hud .checkpoint{font-size:1.05rem; font-weight:800; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.coins{display:flex; align-items:center; gap:6px; background:var(--blue); color:#fff; padding:8px 12px;
  border-radius:14px; font-weight:800; box-shadow:0 4px 0 #12203a; font-variant-numeric:tabular-nums;}
.coins .c{width:20px; height:20px; border-radius:50%; background:radial-gradient(circle at 35% 30%, #ffe08a, var(--yellow) 60%, var(--yellow-d));
  border:2px solid #fff; box-shadow:inset 0 0 0 2px var(--yellow-d);}
.coin-pop{animation:coinPop .4s ease;}
@keyframes coinPop{0%{transform:scale(1);}40%{transform:scale(1.35);}100%{transform:scale(1);}}

/* ============================ GAME LAYOUT ============================ */
#game{display:flex; flex-direction:column;}
.bonusbar{display:flex; justify-content:center; padding:0 12px 4px;}
.bonuschip{background:rgba(255,255,255,.85); border-radius:20px; padding:6px 14px; font-weight:800;
  color:var(--blue); box-shadow:0 3px 0 rgba(0,0,0,.1); font-size:.9rem; display:inline-flex; gap:8px; align-items:center;}
.bonuschip .jar{font-size:1.1rem;}
.bonuschip:active{transform:translateY(2px);}

.gridwrap{flex:1; display:flex; align-items:center; justify-content:center; min-height:0; padding:6px 10px;}
.grid{display:grid; gap:4px;}
.cell{
  width:var(--cell); height:var(--cell); border-radius:9px;
  display:flex; align-items:center; justify-content:center;
  font-weight:800; font-size:calc(var(--cell) * .5);
  color:var(--blue);
  /* opaque enough to hold its shape over a road photo — at .32 the empty
     slots disappeared into the scenery and you couldn't read the word length */
  background:rgba(255,255,255,.62);
  box-shadow:inset 0 0 0 2px rgba(29,53,87,.22), 0 2px 6px rgba(0,0,0,.10);
}
.cell.filled{background:#fff; color:var(--blue); box-shadow:0 3px 0 var(--tile-sh); animation:cellPop .32s cubic-bezier(.2,1.4,.5,1);}
.cell.hinted{background:#fff2cf; color:var(--orange-d);}
@keyframes cellPop{0%{transform:scale(.3); opacity:.2;}60%{transform:scale(1.15);}100%{transform:scale(1);}}

/* word in progress */
.wordbar{height:52px; display:flex; align-items:center; justify-content:center;}
.wordbubble{min-width:64px; padding:6px 18px; border-radius:16px; font-size:1.6rem; font-weight:800;
  letter-spacing:3px; color:#fff; background:var(--blue); box-shadow:0 4px 0 #12203a; min-height:48px;
  display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity .15s;}
.wordbubble.show{opacity:1;}
.wordbubble.bonusmatch{background:var(--orange); box-shadow:0 4px 0 var(--orange-d);}
.wordbubble.answermatch{background:var(--green); box-shadow:0 4px 0 var(--green-d);}
.wordbubble.shake{animation:shake .4s;}
@keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-9px);}40%{transform:translateX(9px);}60%{transform:translateX(-6px);}80%{transform:translateX(6px);}}

/* ============================ WHEEL ============================ */
.wheelzone{padding:2px 10px calc(10px + var(--safe-b));}
.controls{display:flex; justify-content:center; gap:14px; margin-bottom:8px;}
.ctrl{width:54px; height:54px; border-radius:50%; background:#fff; box-shadow:0 5px 0 var(--tile-sh);
  display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:1.4rem; position:relative;}
.ctrl:active{transform:translateY(4px); box-shadow:0 1px 0 var(--tile-sh);}
.ctrl .lbl{font-size:.55rem; font-weight:800; color:var(--ink-soft); margin-top:-2px;}
.ctrl .cost{position:absolute; top:-8px; right:-8px; background:var(--blue); color:#fff; font-size:.6rem;
  font-weight:800; border-radius:10px; padding:2px 6px; box-shadow:0 2px 0 #12203a;}
.wheel{position:relative; width:min(300px,82vw); height:min(300px,82vw); margin:0 auto; touch-action:none;}
.wheel .ring{position:absolute; inset:6%; border-radius:50%;
  background:radial-gradient(circle at 50% 35%, rgba(255,255,255,.9), rgba(255,255,255,.55));
  box-shadow:inset 0 0 0 6px rgba(230,57,70,.25), 0 8px 0 rgba(0,0,0,.08);}
.linecanvas{position:absolute; inset:0; width:100%; height:100%; pointer-events:none; z-index:2;}
.tile{position:absolute; width:var(--twh); height:var(--twh); border-radius:50%;
  transform:translate(-50%,-50%); display:flex; align-items:center; justify-content:center;
  font-size:calc(var(--twh) * .46); font-weight:800; color:var(--blue);
  background:linear-gradient(180deg,#fff,#fff3df); box-shadow:0 5px 0 var(--tile-sh); z-index:3;
  transition:transform .28s cubic-bezier(.2,1.2,.4,1), background .12s;}
.tile.sel{background:linear-gradient(180deg,var(--yellow),var(--yellow-d)); color:var(--blue); box-shadow:0 3px 0 #b98600;}
.centerbtn{position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); z-index:4;
  width:var(--twh); height:var(--twh); border-radius:50%; display:none; align-items:center; justify-content:center;
  font-size:calc(var(--twh)*.5); background:var(--green); color:#fff; box-shadow:0 4px 0 var(--green-d);}
.centerbtn.show{display:flex;}
.centerbtn:active{transform:translate(-50%,-46%);}

/* flying letters */
.fly{position:fixed; z-index:60; border-radius:9px; display:flex; align-items:center; justify-content:center;
  font-weight:800; color:var(--blue); background:#fff; box-shadow:0 4px 10px rgba(0,0,0,.25);
  pointer-events:none; transition:transform .5s cubic-bezier(.4,.1,.2,1), opacity .5s;}

/* ============================ TOASTS ============================ */
#toasts{position:fixed; left:0; right:0; top:22%; display:flex; flex-direction:column; align-items:center; gap:8px; z-index:70; pointer-events:none;}
.toast{padding:12px 22px; border-radius:18px; font-weight:800; font-size:1.5rem; color:#fff;
  background:var(--green); box-shadow:0 6px 0 var(--green-d); animation:toastIn .3s ease, toastOut .3s ease 1s forwards;}
.toast.bonus{background:var(--orange); box-shadow:0 6px 0 var(--orange-d); font-size:1.2rem;}
.toast.nudge{background:var(--blue); box-shadow:0 6px 0 #12203a; font-size:1.1rem;}
@keyframes toastIn{from{transform:translateY(-16px) scale(.8); opacity:0;}to{transform:none; opacity:1;}}
@keyframes toastOut{to{transform:translateY(-14px) scale(.9); opacity:0;}}

/* ============================ MODALS / OVERLAYS ============================ */
.overlay{position:fixed; inset:0; background:rgba(20,12,4,.55); z-index:80; display:flex;
  align-items:center; justify-content:center; padding:20px; animation:fadeIn .2s;}
.card{background:var(--cream); border-radius:24px; padding:22px; width:min(420px,92vw); max-height:88vh; overflow:auto;
  box-shadow:0 12px 0 rgba(0,0,0,.2), 0 0 0 4px #fff inset; text-align:center;}
.card h2{margin:.1em 0 .35em; font-size:1.6rem; color:var(--blue);}
.card .row{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:12px 4px; border-bottom:1px dashed rgba(0,0,0,.15);}
.card .row:last-child{border-bottom:none;}
.switch{width:58px; height:32px; border-radius:20px; background:#c9b79a; position:relative; transition:background .2s;}
.switch.on{background:var(--green);}
.switch::after{content:""; position:absolute; top:3px; left:3px; width:26px; height:26px; border-radius:50%; background:#fff; transition:left .2s;}
.switch.on::after{left:29px;}
.bonuslist{display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-top:8px;}
.bonuslist span{background:var(--orange); color:#fff; padding:5px 12px; border-radius:12px; font-weight:800; letter-spacing:1px;}
.bonuslist .miss{background:#e6d7bf; color:#a08a68;}

/* ============================ JOURNEY MAP ============================ */
/* backdrop comes from #scene (the Kenya map) */
.maphead{display:flex; align-items:center; gap:8px; padding:calc(8px + env(safe-area-inset-top,0px)) 12px 6px;}
.maphead h2{flex:1; text-align:center; color:#fff; margin:0; -webkit-text-stroke:1.5px var(--blue); text-shadow:2px 2px 0 var(--green-d); font-size:1.5rem;}
.maproad{flex:1; overflow-y:auto; overflow-x:hidden; padding:10px 0 40px; position:relative;}
.route{position:relative; width:100%; max-width:520px; margin:0 auto; padding:10px 0;}
.route::before{content:""; position:absolute; left:50%; top:0; bottom:0; width:54px; transform:translateX(-50%);
  background:var(--road); border-radius:30px;
  box-shadow:inset 6px 0 0 rgba(255,255,255,.06), inset -6px 0 0 rgba(0,0,0,.15);}
.route::after{content:""; position:absolute; left:50%; top:14px; bottom:14px; width:0; transform:translateX(-50%);
  border-left:5px dashed var(--road-line);}
.stop{position:relative; display:flex; align-items:center; min-height:78px; z-index:2;}
.stop .medal{position:absolute; left:50%; transform:translateX(-50%); width:52px; height:52px; border-radius:50%;
  background:#fff; box-shadow:0 4px 0 rgba(0,0,0,.25); display:flex; align-items:center; justify-content:center;
  font-weight:800; color:var(--blue); font-size:1.1rem; border:3px solid var(--blue);}
.stop.done .medal{background:var(--green); color:#fff; border-color:var(--green-d);}
.stop.current .medal{background:var(--yellow); border-color:var(--red); animation:pulse 1.2s infinite;}
.stop.locked .medal{background:#cbb89a; color:#fff; border-color:#a58d68;}
@keyframes pulse{0%,100%{box-shadow:0 4px 0 rgba(0,0,0,.25), 0 0 0 0 rgba(230,57,70,.5);}50%{box-shadow:0 4px 0 rgba(0,0,0,.25), 0 0 0 10px rgba(230,57,70,0);}}
/* the map behind these is busy with its own place names, so the chips stay
   fully opaque and carry a ring to cut themselves out of it */
.stop .label{position:absolute; width:40%; padding:6px 10px; background:#fff; border-radius:12px;
  box-shadow:0 3px 0 rgba(0,0,0,.22), 0 0 0 2px rgba(29,53,87,.22);
  font-weight:800; font-size:.9rem; color:var(--ink);}
.stop.left .label{right:52%; text-align:right;}
.stop.right .label{left:52%; text-align:left;}
/* muted rather than translucent — fading these into the map made them vanish */
.stop.locked .label{background:#e7dcc6; color:#6f5e42;}
.stop.locked .label .tag{color:#8a7757;}
.stop .label .tag{display:block; font-size:.65rem; font-weight:700; color:var(--ink-soft);}
.stop.current .label{background:var(--yellow); }
.stop .matatu-mini{position:absolute; left:50%; transform:translate(-50%,-118%); width:74px; z-index:5; filter:drop-shadow(0 4px 3px rgba(0,0,0,.3));}
.stop.playable{cursor:pointer;}

/* ============================ LEVEL INTRO ============================ */
#intro{align-items:center; justify-content:center; text-align:center; padding:24px; gap:8px;}
#intro .kicker{font-weight:800; color:var(--blue); letter-spacing:2px; text-transform:uppercase; font-size:.85rem;
  text-shadow:0 1px 3px rgba(255,246,233,.95);}
#intro h2{font-size:2.4rem; margin:.1em 0; color:var(--red); -webkit-text-stroke:1.5px var(--blue); text-shadow:3px 3px 0 rgba(0,0,0,.12);}
#intro .depart{color:var(--ink); font-weight:800; text-shadow:0 1px 3px rgba(255,246,233,.95);}
.intro-matatu{width:min(340px,86vw);}

/* ============================ CELEBRATION ============================ */
#celebrate{align-items:center; justify-content:center; text-align:center; padding:24px; gap:6px;}
.celebrate-card{background:var(--cream); border-radius:26px; padding:26px 22px; width:min(420px,92vw);
  box-shadow:0 12px 0 rgba(0,0,0,.2), 0 0 0 5px #fff inset;}
.celebrate-card h2{color:var(--green); font-size:1.9rem; margin:.1em 0;}
.celebrate-card .shout{font-size:1.3rem; font-weight:800; color:var(--red); margin:6px 0;}
.celebrate-card .stat{display:flex; justify-content:space-around; margin:14px 0; }
.celebrate-card .stat div{font-weight:800; color:var(--blue);}
.celebrate-card .stat span{display:block; font-size:.7rem; color:var(--ink-soft); font-weight:700;}
.arrive-matatu{width:min(300px,80vw); margin:2px auto 6px;}

/* confetti */
#confetti{position:fixed; inset:0; pointer-events:none; z-index:90; overflow:hidden;}
.confetti-bit{position:absolute; width:11px; height:16px; top:-20px; will-change:transform;}

/* ============================ ROUTE COMPLETE ============================ */
#finish{align-items:center; justify-content:center; text-align:center; padding:24px; gap:8px;}
#finish h1{color:var(--yellow); font-size:2.2rem; -webkit-text-stroke:1.5px #12203a; text-shadow:3px 3px 0 rgba(0,0,0,.3); margin:.1em;}
#finish .fcard{background:rgba(255,255,255,.95); border-radius:22px; padding:22px; width:min(400px,90vw); box-shadow:0 10px 0 rgba(0,0,0,.3);}
#finish .stat{display:flex; justify-content:space-around; margin:12px 0;}
#finish .stat div{font-weight:800; color:var(--blue); font-size:1.4rem;}
#finish .stat span{display:block; font-size:.72rem; color:var(--ink-soft);}

/* driving animation */
/* full-screen overlay, so it carries its own photo — the road *ahead*, set
   inline by driveToNextLevel() from the stop being driven to */
/* flex-end + padding sits the matatu down on the road strip rather than
   floating it in the middle of the scenery */
#drive{position:fixed; inset:0; z-index:85; background:#8fd07f center/cover no-repeat;
  display:flex; flex-direction:column; align-items:center; justify-content:flex-end;
  padding-bottom:19%; overflow:hidden;}
#drive::before{content:""; position:absolute; inset:0;
  background:linear-gradient(180deg, rgba(255,246,233,.58) 0%, rgba(255,246,233,.20) 45%, rgba(52,34,16,.40) 100%);}
/* the inset shadow feathers the top edge so tarmac meets photo instead of
   cutting a hard line across it */
#drive .road{position:absolute; left:0; right:0; bottom:0; height:25%; background:var(--road);
  box-shadow:0 -26px 34px -2px rgba(58,58,68,.92);}
#drive .road::before{content:""; position:absolute; top:48%; left:0; right:0; height:6px; background:repeating-linear-gradient(90deg,var(--road-line) 0 40px, transparent 40px 80px); animation:dash .5s linear infinite;}
@keyframes dash{to{background-position:-80px 0;}}
#drive .drive-matatu{width:min(280px,72vw); position:relative; z-index:2; animation:bob .5s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0) rotate(-1deg);}50%{transform:translateY(-6px) rotate(1deg);}}
#drive .drivelabel{position:absolute; top:16%; font-weight:800; color:var(--blue); font-size:1.3rem; text-align:center; width:90%;}

.tinylink{background:none; text-decoration:underline; color:var(--blue); font-weight:700; font-size:.85rem;}
.pill{display:inline-block; padding:3px 10px; border-radius:12px; font-size:.7rem; font-weight:800; text-transform:uppercase; letter-spacing:1px; color:#fff;}
.pill.easy{background:var(--green);} .pill.medium{background:var(--yellow); color:var(--ink);}
.pill.hard{background:var(--orange);} .pill.expert{background:var(--red);}

/* ============================ JOURNEY LAYER ============================
   Route map, arrival, journey end, scoreboard, debug.
   Painted-sign vocabulary: hard shadows, thick strokes, flat colour blocks.
   No transitions heavier than a transform — this has to run on a cheap
   Android phone.
   ====================================================================== */

/* ---- route map: stops threaded onto the road ---- */
#map{display:flex; flex-direction:column;}
.kstop{position:relative; display:flex; align-items:center; justify-content:center;
  min-height:58px; z-index:2;}
.kmarker{width:44px; height:44px; border-radius:50%; display:grid; place-items:center;
  background:#cbb89a; border:4px solid #a58d68; color:#fff; font-size:1.15rem; font-weight:800;
  box-shadow:0 4px 0 rgba(0,0,0,.22);}
.kstop.done .kmarker{background:var(--green); border-color:var(--green-d);}
.kstop.current .kmarker{background:var(--yellow); border-color:var(--red); animation:pulse 1.2s infinite;}
.kstop.major .kmarker{width:56px; height:56px; border-width:5px;}
.kstop.major.locked .kmarker{background:#bda98a;}

.klabel{position:absolute; max-width:40%; padding:6px 12px; background:#fff; border-radius:12px;
  box-shadow:0 3px 0 rgba(0,0,0,.15);}
.kstop.left  .klabel{right:calc(50% + 34px); text-align:right;}
.kstop.right .klabel{left:calc(50% + 34px);  text-align:left;}
.kstop.locked .klabel{opacity:.72; background:#efe6d4;}
.kstop.current .klabel{background:var(--yellow);}
.kstop.major .klabel{border:3px solid var(--blue);}
.kname{font-weight:800; font-size:.95rem; line-height:1.15;}
.kmeta{font-size:.65rem; font-weight:700; color:var(--ink-soft); margin-top:1px;}

/* road segment between two stops; hosts the fractional matatu */
.kseg{position:relative; height:52px;}
.kseg.done .ksegline, .ksegfill{position:absolute; left:50%; top:0; width:9px;
  transform:translateX(-50%); border-radius:5px;}
.kseg.done .ksegline{height:100%; background:var(--green);}
/* Orange, not yellow — the road already has a yellow dashed centre line,
   and yellow-on-yellow makes the progress fill invisible. */
.ksegfill{background:var(--orange); box-shadow:0 0 0 2px rgba(230,57,70,.35);}
.kmatatu{position:absolute; left:50%; width:68px; transform:translate(-50%,-50%);
  z-index:6; filter:drop-shadow(0 4px 3px rgba(0,0,0,.32));}

/* map footer: what the next level buys */
.mapfoot{padding:8px 12px calc(10px + var(--safe-b)); display:flex; justify-content:center;}
.footcard{background:var(--cream); border-radius:18px; padding:12px 16px; text-align:center;
  width:min(420px,94vw); box-shadow:0 6px 0 rgba(0,0,0,.22);}
.footline{font-weight:800; color:var(--blue); font-size:1rem;}
.footsub{font-size:.75rem; font-weight:700; color:var(--ink-soft); margin:2px 0 8px;}

/* ---- arrival ---- */
.arrival{align-items:center; justify-content:center; padding:16px; overflow-y:auto;}
.arrival.minor{background:linear-gradient(180deg,#ffe8bf,#f7b267);}
.arrival.major{background:linear-gradient(180deg,#1D3557,#2b4a78);}
.arrivecard{background:var(--cream); border-radius:26px; padding:22px 20px; text-align:center;
  width:min(430px,93vw); box-shadow:0 10px 0 rgba(0,0,0,.28); margin:auto;}
.arrival.major .arrivecard{border:5px solid var(--yellow);}
.kikuu{display:inline-block; background:var(--red); color:#fff; font-weight:800; letter-spacing:2px;
  font-size:.7rem; padding:4px 14px; border-radius:20px; margin-bottom:6px;}
.arrivekicker{font-size:.8rem; font-weight:800; letter-spacing:2px; text-transform:uppercase;
  color:var(--ink-soft);}
.arrivename{margin:.05em 0 .15em; font-size:2.1rem; color:var(--red);
  -webkit-text-stroke:1.5px var(--blue); text-shadow:3px 3px 0 rgba(0,0,0,.18); line-height:1.05;}
.arrival.major .arrivename{font-size:2.5rem;}
.arrivecard .arrive-matatu{width:min(250px,70vw); margin:6px auto;}

.farestrip{display:inline-flex; align-items:center; gap:8px; background:var(--blue); color:#fff;
  border-radius:14px; padding:8px 14px; font-weight:800; margin-top:6px; flex-wrap:wrap;
  justify-content:center;}
.fareleg{font-size:.95rem;}
.faredot{opacity:.6;}
.fareamt{display:inline-flex; align-items:center; gap:5px; color:var(--yellow); font-size:1.05rem;}
.fareamt .c{width:15px; height:15px; border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #ffe08a, var(--yellow) 60%, var(--yellow-d));}
.farenote{font-size:.72rem; font-weight:700; color:var(--ink-soft); margin-top:5px;}

.blurb{font-size:.92rem; line-height:1.5; color:var(--ink); font-weight:600;
  margin:14px 0 4px; text-align:left; border-left:4px solid var(--orange); padding-left:12px;}
.arrival.major .blurb{font-size:.98rem;}
.arrivecard .stat{display:flex; justify-content:space-around; margin:14px 0;}
.arrivecard .stat div{font-weight:800; color:var(--blue); font-size:1.3rem;}
.arrivecard .stat span{display:block; font-size:.68rem; color:var(--ink-soft); font-weight:700;}

#finish .blurb{margin:12px 0;}

/* ---- scoreboard ---- */
.boardwrap{flex:1; overflow-y:auto; padding:8px 12px calc(20px + var(--safe-b));
  max-width:560px; margin:0 auto; width:100%;}
.btable{width:100%; border-collapse:collapse; background:rgba(255,255,255,.95);
  border-radius:16px; overflow:hidden; box-shadow:0 6px 0 rgba(0,0,0,.2);}

.btable .num{text-align:center; font-weight:800; color:var(--blue);}
.btable .rank{width:34px; text-align:center; font-weight:800; color:var(--red); font-size:1.1rem;}
.bname{font-weight:800; font-size:.95rem;}
.bmeta{font-size:.68rem; font-weight:700; color:var(--ink-soft);}
.boardnote{font-size:.72rem; font-weight:600; color:var(--ink-soft); line-height:1.5;
  background:rgba(255,255,255,.7); border-radius:12px; padding:10px 12px; margin-top:12px;}

/* ---- traffic wall ---- */
/* transparent so the jam photo behind it shows through; the hazard bands and
   the card carry the structure */
#traffic{align-items:center; justify-content:center; padding:0; overflow-y:auto;
  background:transparent;}
/* road-works hazard banding, top and bottom */
.hazard{width:100%; height:18px; flex:none;
  background:repeating-linear-gradient(45deg, var(--yellow) 0 14px, var(--ink) 14px 28px);}
/* Height must clear the lowest car or the queue runs over the title below.
   The matatu SVG renders 0.59x its own width tall, and each car is 62% of
   this box, so a car is 0.62 * 0.59 = 0.37 of the box width, plus the 76px
   stagger of the lowest one. */
.jam{position:relative; width:min(340px,86vw); margin:14px auto 0;
  height:calc(min(340px,86vw) * 0.37 + 80px); flex:none;}
.jamcar{position:absolute; width:62%; filter:drop-shadow(0 5px 4px rgba(0,0,0,.4));}
/* bumper to bumper, staggered so they read as a queue not a stack */
.jamcar.a{left:0;    top:76px; z-index:3;}
.jamcar.b{left:19%;  top:38px; z-index:2; opacity:.94;}
.jamcar.c{left:38%;  top:0;    z-index:1; opacity:.88;}
.traffictitle{margin:.15em 0 0; font-size:2.3rem; color:var(--yellow);
  -webkit-text-stroke:2px var(--ink); text-shadow:3px 3px 0 rgba(0,0,0,.45); text-align:center;}
.trafficsub{font-size:1rem; font-weight:800; letter-spacing:4px; text-transform:uppercase;
  color:#fff; opacity:.85; margin-bottom:12px;}
.trafficcard{background:var(--cream); border-radius:22px; padding:18px 18px 20px;
  width:min(420px,92vw); text-align:center; box-shadow:0 8px 0 rgba(0,0,0,.35);
  border:4px solid var(--ink); margin-bottom:18px;}
.trafficcard .tbody{margin:0 0 8px; font-size:.95rem; font-weight:700; line-height:1.5;}
.trafficcard .tbody.en{font-size:.82rem; font-weight:600; color:var(--ink-soft); font-style:italic;}
.tstuck{display:inline-block; background:var(--red); color:#fff; font-weight:800;
  border-radius:14px; padding:7px 14px; font-size:.88rem; margin:6px 0 10px;}
.tnote{font-size:.74rem; font-weight:700; color:var(--ink-soft); line-height:1.5;
  border-top:2px dashed #d8c7ab; padding-top:10px; margin-bottom:12px;}
.footcard.jammed{background:#55595f; color:#fff; border:3px solid var(--yellow);}
.footcard.jammed .footline{color:var(--yellow);}
.footcard.jammed .footsub{color:#e8e2d6;}

/* ---- debug (dev builds only) ---- */
#debugFab{position:fixed; right:10px; bottom:calc(10px + var(--safe-b)); z-index:90;

/* ======================================================================
   PERSISTENCE

   The save itself lives in journey.js (IndexedDB, versioned, migrated).
   `state` is kept as a thin view onto it so the gameplay code below can
   go on reading `state.sarafu` / `state.levels` unchanged. Coins are
   read-only through here — the ledger is the only way to move them.
   ====================================================================== */
const state = {
  get sarafu(){ return coins(); },
  get soundOn(){ return SAVE.profile.soundOn; },
  set soundOn(v){ SAVE.profile.soundOn = v; persist(); },
  get matatuName(){ return SAVE.profile.matatuName; },
  set matatuName(v){ SAVE.profile.matatuName = v; persist(); },
  get skinIdx(){ return SAVE.profile.skinIdx; },
  set skinIdx(v){ SAVE.profile.skinIdx = v; persist(); },
  get levels(){ return SAVE.levels; },
  get currentLevelId(){ return SAVE.levelCursor; },
  set currentLevelId(v){ SAVE.levelCursor = v; persist(); },
};
function saveState(){ persist(); }
function levelRecord(id){
  if(!state.levels[id]) state.levels[id] = {completed:false, foundAnswers:[], foundBonus:[]};
  return state.levels[id];
}
function skin(){ return MATATU_SKINS[state.skinIdx % MATATU_SKINS.length]; }

/* ======================================================================
   SEEDED RNG (mulberry32) — deterministic grid per levelId
   ====================================================================== */
function makeRNG(seed){
  let a = seed >>> 0;
  return function(){
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

/* ======================================================================
   TILE TOKENIZER (digraph aware)
   ====================================================================== */
function splitTiles(word, tileset){
  word = word.toUpperCase();
  const known = [...new Set(tileset)].sort((a,b)=> b.length - a.length);
  const out = [];
  let i = 0;
  while(i < word.length){
    let matched = null;
    for(const t of known){ if(word.startsWith(t, i)){ matched = t; break; } }
    if(matched){ out.push(matched); i += matched.length; }
    else { out.push(word[i]); i += 1; }
  }
  return out;
}

/* ======================================================================
   CROSSWORD GENERATOR — deterministic greedy packer
   ====================================================================== */
function generateGrid(puzzle){
  const rng = makeRNG((puzzle.levelId * 2654435761) >>> 0);
  const words = puzzle.answers.map((w, i) => ({
    id: i, word: w, tiles: splitTiles(w, puzzle.letters)
  }));
  // longest first; deterministic alpha tiebreak
  words.sort((a,b)=> b.tiles.length - a.tiles.length || (a.word < b.word ? -1 : 1));
  words.forEach((w, i) => w.id = i);

  const cells = new Map();
  const placements = [];
  const key = (r,c) => r + "," + c;
  const getCell = (r,c) => cells.get(key(r,c));

  // returns number of crossings if placeable, or false
  function canPlace(tiles, r, c, dir){
    const dr = dir === 'V' ? 1 : 0, dc = dir === 'H' ? 1 : 0;
    if(getCell(r - dr, c - dc)) return false;                      // before start
    if(getCell(r + dr*tiles.length, c + dc*tiles.length)) return false; // after end
    let crossings = 0;
    for(let i=0;i<tiles.length;i++){
      const cr = r + dr*i, cc = c + dc*i;
      const ex = getCell(cr, cc);
      if(ex){
        if(ex.letter !== tiles[i]) return false;
        crossings++;
      } else {
        // perpendicular neighbours must be empty (no parallel touching)
        if(getCell(cr + dc, cc + dr)) return false;
        if(getCell(cr - dc, cc - dr)) return false;
      }
    }
    return crossings;
  }

  function place(entry, r, c, dir){
    const dr = dir === 'V' ? 1 : 0, dc = dir === 'H' ? 1 : 0;
    const keys = [];
    for(let i=0;i<entry.tiles.length;i++){
      const cr = r + dr*i, cc = c + dc*i, k = key(cr, cc);
      let cell = cells.get(k);
      if(!cell){ cell = {r:cr, c:cc, letter:entry.tiles[i], answerIds:[], filled:false, hinted:false}; cells.set(k, cell); }
      cell.answerIds.push(entry.id);
      keys.push(k);
    }
    placements.push({id:entry.id, word:entry.word, tiles:entry.tiles, r, c, dir, keys, found:false});
  }

  place(words[0], 0, 0, 'H');
  for(let w=1; w<words.length; w++){
    const entry = words[w];
    let best = null;
    const existing = [...cells.values()];
    for(const ex of existing){
      for(let i=0;i<entry.tiles.length;i++){
        if(entry.tiles[i] !== ex.letter) continue;
        for(const dir of ['H','V']){
          const dr = dir === 'V' ? 1 : 0, dc = dir === 'H' ? 1 : 0;
          const r = ex.r - dr*i, c = ex.c - dc*i;
          const res = canPlace(entry.tiles, r, c, dir);
          if(res === false || res < 1) continue;
          const score = res*100 - (Math.abs(r) + Math.abs(c)) + rng()*0.01;
          if(!best || score > best.score) best = {r, c, dir, score};
        }
      }
    }
    if(best){
      place(entry, best.r, best.c, best.dir);
    } else {
      // fallback: open space just below the current cluster
      let maxR = -Infinity, minC = Infinity;
      for(const cell of cells.values()){ maxR = Math.max(maxR, cell.r); minC = Math.min(minC, cell.c); }
      place(entry, maxR + 2, minC, 'H');
    }
  }

  let minR=Infinity, maxR=-Infinity, minC=Infinity, maxC=-Infinity;
  for(const cell of cells.values()){
    minR=Math.min(minR,cell.r); maxR=Math.max(maxR,cell.r);
    minC=Math.min(minC,cell.c); maxC=Math.max(maxC,cell.c);
  }
  return {cells, placements, minR, maxR, minC, maxC, rows:maxR-minR+1, cols:maxC-minC+1};
}

/* ======================================================================
   WEB AUDIO — tiny procedural SFX (no files)
   ====================================================================== */
let audioCtx = null;
function actx(){
  if(!audioCtx){ try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
  return audioCtx;
}
function beep(freq, dur, type, vol, whenOff){
  if(!state.soundOn) return;
  const ctx = actx(); if(!ctx) return;
  const t0 = ctx.currentTime + (whenOff||0);
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.type = type||"sine"; o.frequency.setValueAtTime(freq, t0);
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(vol||0.2, t0+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
  o.connect(g); g.connect(ctx.destination);
  o.start(t0); o.stop(t0+dur+0.02);
}
const SFX = {
  select(){ beep(520+Math.random()*40, 0.06, "sine", 0.12); },
  correct(){ beep(523,0.1,"triangle",0.2,0); beep(659,0.1,"triangle",0.2,0.08); beep(784,0.16,"triangle",0.2,0.16); },

  coin(){ beep(1200,0.05,"square",0.12,0); beep(1600,0.07,"square",0.12,0.05); },

/* ======================================================================
   ROAD SCENERY — which photo sits behind each screen
   ====================================================================== */
// Ordered Nairobi -> Mombasa to match the route in build.py, so the view out
// of the matatu changes as the player works down the vituo: city gridlock,
// then highway, then open country, then the coast.
const ROAD_PHOTOS = [
  "assets/road-01-nairobi-jam.jpg",
  "assets/road-02-nairobi-highway.jpg",
  "assets/road-03-rironi.jpg",
  "assets/road-04-matatu-mzigo.jpg",
  "assets/road-05-escarpment.jpg",
  "assets/road-06-green-highway.jpg",
  "assets/road-07-a109-sign.jpg",
  "assets/road-08-mountain.jpg",
  "assets/road-09-sgr-bridge.jpg",
  "assets/road-10-mombasa-tusks.jpg",
];
const HOME_PHOTO   = "assets/road-08-mountain.jpg";      // open road for the title
const FINISH_PHOTO = "assets/road-10-mombasa-tusks.jpg"; // Mombasa = end of the line
const MAP_PHOTO    = "assets/kenya-map.jpg";

// The stretch of road a given kituo is driving through. The photos are spread
// across the whole route rather than cycled, so the scenery only ever moves
// forward — cycling would drop you back into Nairobi traffic at Mtito Andei.
function roadFor(levelId){
  const i = Math.floor((levelId - 1) * ROAD_PHOTOS.length / PUZZLES.length);
  return ROAD_PHOTOS[Math.max(0, Math.min(ROAD_PHOTOS.length - 1, i))];
}

// Same idea, but keyed to a stop rather than a puzzle. The journey layer
// thinks in stops, and the route is longer than the puzzle list, so spreading
// by levelId would run out of road before Mombasa.
function roadForStop(stopIndex){
  const i = Math.floor(stopIndex * ROAD_PHOTOS.length / Math.max(1, STOPS.length - 1));
  return ROAD_PHOTOS[Math.max(0, Math.min(ROAD_PHOTOS.length - 1, i))];
}

const sceneEl = document.getElementById("scene");
const scenePhotos = Array.from(sceneEl.querySelectorAll(".photo"));
let sceneTop = 0;    // index of the layer currently on screen
let sceneSrc = null; // what it holds, so re-rendering the same screen doesn't re-fade

/* veil: "open" | "play" | "dusk" | "map" — see the #scene rules in the stylesheet */
function setScene(src, veil){
  sceneEl.dataset.veil = veil;
  // the map is shown at 80% so it reads as a backdrop, not a foreground chart
  sceneEl.style.setProperty("--photo-op", veil === "map" ? ".8" : "1");
  if(src === sceneSrc) return;
  sceneSrc = src;
  sceneTop = 1 - sceneTop;
  const next = scenePhotos[sceneTop];
  next.style.backgroundImage = `url("${src}")`;
  next.classList.add("on");
  scenePhotos[1 - sceneTop].classList.remove("on");
}

function toast(msg, kind){
  const t = el(`<div class="toast ${kind||''}">${msg}</div>`);
  document.getElementById("toasts").appendChild(t);
  setTimeout(()=> t.remove(), 1400);
}

let lastPraise = -1;
function praise(){
  let i;
  do { i = Math.floor(Math.random()*STRINGS.praise.length); } while(i === lastPraise && STRINGS.praise.length>1);
  lastPraise = i;
  return STRINGS.praise[i];
}

function firstPlayableLevel(){
  const next = nextUnplayedLevel();
  return next !== null ? next : PUZZLES[PUZZLES.length-1].levelId; // all done -> last
}

// The next puzzle the player has never cleared, or null once the word list
// is exhausted. The route is longer than the content: 21 legs need 42
// levels and there are only 30 puzzles, so the journey stops at Bachuma
// Gate until more words are added to the CSV.
function nextUnplayedLevel(){
  for(const p of PUZZLES){ if(!(state.levels[p.levelId] && state.levels[p.levelId].completed)) return p.levelId; }
  return null;
}
function outOfWords(){ return nextUnplayedLevel() === null; }

// Label for the leg currently being travelled — used by the level HUD and
// the map. At the end of the act there is no next stop.
function legLabel(){
  const from = currentStop(), to = nextStop();
  if(!to) return {kicker: STRINGS.safari, title: from.name};
  const done = SAVE.journey.levelsDoneThisLeg;
  return {
    kicker: STRINGS.ngaziYa(Math.min(done + 1, to.levelsToAdvance), to.levelsToAdvance),
    title: STRINGS.legOf(from.name, to.name),
  };
}

// The route map. This is the hub: a vertical stretch of the A109 with the
// matatu sitting at a fractional position along the leg it is driving, so
// "one of two levels done" is visible without opening anything.
function renderMap(){
  const node = el(`
    <div class="screen" id="map">
      <div class="maphead">
        <button class="icon-btn" id="mHome">🏠</button>
        <h2>${STRINGS.mapTitle}</h2>
        <div class="coins" id="coinBox"><span class="c"></span><span id="coinNum">${coins()}</span></div>
      </div>
      <div class="maproad"><div class="route" id="route"></div></div>
      <div class="mapfoot" id="mapFoot"></div>
    </div>`);
  node.querySelector("#mHome").onclick = renderHome;
  const route = node.querySelector("#route");
  const here = SAVE.journey.stopIndex;

  STOPS.forEach((s, i)=>{
    const done    = i <= here;
    const current = i === here;
    const status  = current ? "current" : done ? "done" : "locked";

    route.appendChild(el(`
      <div class="kstop ${status} ${s.tier} ${i % 2 === 0 ? "left" : "right"}" data-id="${s.id}">
        <!-- The matatu itself is drawn on the road segment below, so an
             arrived stop just gets a tick — no second vehicle. -->
        <div class="kmarker">${done ? "✓" : ""}</div>
        <div class="klabel">
          <div class="kname">${s.name}</div>
          <div class="kmeta">${s.kmFromNairobi} km${
            i > 0 ? ` · ${STRINGS.nauli} ${s.fareFromPrevious}` : ""
          }</div>
        </div>
      </div>`));

    // Road segment between this stop and the next, carrying the matatu
    // when it is the leg in progress.
    const next = STOPS[i+1];
    if(!next) return;
    const travelling = i === here;
    const pct = travelling ? Math.round(legProgress() * 100) : 0;
    const seg = el(`
      <div class="kseg ${i < here ? "done" : ""} ${travelling ? "active" : ""}">
        <div class="ksegline"></div>
        ${travelling ? `
          <div class="ksegfill" style="height:${pct}%"></div>
          <div class="kmatatu" style="top:${pct}%">
            ${matatuSVG(state.matatuName, null, {people:false})}
          </div>` : ``}
      </div>`);
    route.appendChild(seg);
  });

  // Footer: what the next level buys you, or the end-of-act button.
  const foot = node.querySelector("#mapFoot");
  const to = nextStop();
  if(to && outOfWords()){
    // Road ahead, but no words left to earn the fare with.
    foot.appendChild(el(`
      <div class="footcard jammed">
        <div class="footline">🚧 ${STRINGS.trafficTitle}</div>
        <div class="footsub">${STRINGS.trafficStuck(currentStop().name, to.name)}</div>
        <button class="btn ghost" id="goTraffic">${STRINGS.trafficSub}</button>
      </div>`));
    foot.querySelector("#goTraffic").onclick = ()=> renderTraffic();
  } else if(to){
    const left = levelsRemainingThisLeg();
    foot.appendChild(el(`
      <div class="footcard">
        <div class="footline">${left === 1 ? STRINGS.ngaziMojaHadi(to.name) : STRINGS.ngaziKadhaa(left, to.name)}</div>
        <div class="footsub">${STRINGS.nauli} ${to.fareFromPrevious} · ${legDistanceKm(SAVE.journey.stopIndex+1)} km</div>
        <button class="btn red" id="goLevel">🚐 ${STRINGS.twende}</button>
      </div>`));
    foot.querySelector("#goLevel").onclick = ()=>{ actx(); startLevel(firstPlayableLevel()); };
  } else {
    foot.appendChild(el(`
      <div class="footcard">
        <div class="footline">${STRINGS.mwishoSub}</div>
        <button class="btn green" id="goEnd">🏁 ${STRINGS.safariYangu}</button>
      </div>`));
    foot.querySelector("#goEnd").onclick = ()=> renderJourneyEnd();
  }

  setScene(MAP_PHOTO, "map");
  show(node);
  requestAnimationFrame(()=>{
    const cur = route.querySelector(".kstop.current");
    if(cur) cur.scrollIntoView({block:"center"});
  });
}

function onResize(){
  if(!G || !document.getElementById("game")){ window.removeEventListener("resize", onResize); return; }
  sizeGrid(); layoutWheel(); drawLine();
}

/* ---- grid ---- */
function buildGrid(){
  const gridEl = document.getElementById("grid");
  gridEl.innerHTML = "";
  const {grid} = G;
  gridEl.style.gridTemplateColumns = `repeat(${grid.cols}, var(--cell))`;
  gridEl.style.gridTemplateRows = `repeat(${grid.rows}, var(--cell))`;
  for(const cell of grid.cells.values()){
    const ce = el(`<div class="cell" data-key="${cell.r},${cell.c}"></div>`);
    ce.style.gridRow = (cell.r - grid.minR + 1);
    ce.style.gridColumn = (cell.c - grid.minC + 1);
    gridEl.appendChild(ce);
    G.cellEls.set(cell.r+","+cell.c, ce);
  }
  sizeGrid();
}
function sizeGrid(){
  const {grid} = G;
  const wrap = document.querySelector(".gridwrap");
  if(!wrap) return;
  const availW = wrap.clientWidth - 8;
  const availH = wrap.clientHeight - 8;
  const gap = 4;
  const cw = (availW - gap*(grid.cols-1)) / grid.cols;
  const ch = (availH - gap*(grid.rows-1)) / grid.rows;
  let size = Math.floor(Math.min(cw, ch));
  size = Math.max(20, Math.min(size, 56));
  document.getElementById("grid").style.setProperty("--cell", size + "px");
}

/* ---- wheel ---- */
function buildWheel(){
  const wheel = document.getElementById("wheel");
  // remove existing tiles
  wheel.querySelectorAll(".tile").forEach(t=>t.remove());
  G.tileEls = [];
  G.puzzle.letters.forEach((letter, idx)=>{
    const t = el(`<div class="tile" data-idx="${idx}">${letter}</div>`);
    wheel.appendChild(t);
    G.tileEls[idx] = t;
  });
  layoutWheel();
}
function layoutWheel(){
  const wheel = document.getElementById("wheel");
  if(!wheel) return;
  const W = wheel.clientWidth, H = wheel.clientHeight;
  const n = G.puzzle.letters.length;
  const tw = Math.max(44, Math.min(72, Math.floor(W * (n>6?0.19:0.22))));
  wheel.style.setProperty("--twh", tw + "px");
  const cx = W/2, cy = H/2;
  const R = Math.min(W,H)/2 - tw/2 - 8;
  G.centers = [];
  G.tileOrder.forEach((tileIdx, pos)=>{
    const ang = (-Math.PI/2) + pos * (2*Math.PI/n);
    const x = cx + R*Math.cos(ang);
    const y = cy + R*Math.sin(ang);
    const t = G.tileEls[tileIdx];
    t.style.left = x + "px";
    t.style.top = y + "px";
    G.centers[tileIdx] = {x, y};
  });
}
function shuffleWheel(){
  // Fisher-Yates on display order
  const o = G.tileOrder;
  for(let i=o.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [o[i],o[j]]=[o[j],o[i]]; }
  layoutWheel(); drawLine(); SFX.select();
}

/* ---- selection line ---- */
function drawLine(){
  const svg = document.getElementById("lineCanvas");
  if(!svg) return;
  const wheel = document.getElementById("wheel");
  const W = wheel.clientWidth, H = wheel.clientHeight;
  svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
  let pts = G.selection.map(i=> G.centers[i]).filter(Boolean);
  let d = "";
  if(pts.length){
    d = pts.map((p,i)=> (i?"L":"M")+p.x+" "+p.y).join(" ");
    if(G.dragging && G.pointer){ d += ` L${G.pointer.x} ${G.pointer.y}`; }
  }
  const sk = skin();
  svg.innerHTML = pts.length ? `<path d="${d}" fill="none" stroke="${sk.body}" stroke-width="10"
    stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>` : "";
  // highlight selected tiles + word bubble
  G.tileEls.forEach((t,i)=> t && t.classList.toggle("sel", G.selection.includes(i)));
  updateWordBubble();
}
function currentWord(){ return G.selection.map(i=> G.puzzle.letters[i]).join(""); }
function updateWordBubble(){
  const b = document.getElementById("wordBubble");
  if(!b) return;
  const w = currentWord();
  b.textContent = w;
  b.classList.toggle("show", w.length>0);
  b.classList.remove("answermatch","bonusmatch");
  if(w.length>0){
    if(G.puzzle.answers.includes(w) && !G.foundAnswers.has(w)) b.classList.add("answermatch");
    else if(G.puzzle.bonusWords.includes(w) && !G.foundBonus.has(w)) b.classList.add("bonusmatch");
  }
}

/* ---- pointer input on wheel ---- */
function tileAt(x, y){
  // x,y relative to wheel
  const twh = parseFloat(getComputedStyle(document.getElementById("wheel")).getPropertyValue("--twh"));
  const rad = twh*0.55;
  let bestIdx = -1, bestD = rad;
  for(let i=0;i<G.centers.length;i++){
    const c = G.centers[i]; if(!c) continue;
    const d = Math.hypot(c.x-x, c.y-y);
    if(d < bestD){ bestD = d; bestIdx = i; }
  }
  return bestIdx;
}
function attachWheelInput(){
  const wheel = document.getElementById("wheel");
  const rel = (e)=>{ const r = wheel.getBoundingClientRect(); return {x:e.clientX-r.left, y:e.clientY-r.top}; };

  wheel.addEventListener("pointerdown", (e)=>{
    if(e.target.closest("#centerBtn")) return;
    const p = rel(e); const idx = tileAt(p.x, p.y);
    if(idx < 0){ // tapped empty wheel -> if tapMode, ignore
      return;
    }
    actx();
    wheel.setPointerCapture(e.pointerId);
    if(G.tapMode){
      // tap accumulation
      if(G.selection.length && G.selection[G.selection.length-1] === idx){
        submitSelection(); return;
      }
      if(!G.selection.includes(idx)){ G.selection.push(idx); SFX.select(); }
      drawLine(); updateCenterBtn();
      return;
    }
    // begin drag gesture
    G.dragging = true; G.moved = false;
    G.selection = [idx]; G.pointer = p; SFX.select();
    drawLine();
  });

  wheel.addEventListener("pointermove", (e)=>{
    if(!G.dragging) return;
    const p = rel(e); G.pointer = p;
    const idx = tileAt(p.x, p.y);
    if(idx >= 0){
      const last = G.selection[G.selection.length-1];
      const secondLast = G.selection[G.selection.length-2];
      if(idx === secondLast){ G.selection.pop(); G.moved = true; SFX.select(); }
      else if(idx !== last && !G.selection.includes(idx)){ G.selection.push(idx); G.moved = true; SFX.select(); }
    }
    drawLine();
  });

  const endDrag = (e)=>{
    if(!G.dragging) return;
    G.dragging = false; G.pointer = null;
    if(G.moved && G.selection.length >= 2){
      submitSelection();
    } else if(!G.moved && G.selection.length === 1){
      // single tap -> enter tap-accumulation mode, keep the letter
      G.tapMode = true;
      drawLine(); updateCenterBtn();
    } else {
      clearSelection();
    }
  };
  wheel.addEventListener("pointerup", endDrag);
  wheel.addEventListener("pointercancel", endDrag);
}
function updateCenterBtn(){
  const cb = document.getElementById("centerBtn");
  if(!cb) return;
  cb.classList.toggle("show", G.tapMode && G.selection.length >= 2);
}
function clearSelection(){
  G.selection = []; G.tapMode = false; G.moved = false;
  drawLine(); updateCenterBtn();
}

/* ---- keyboard ---- */
function attachKeyboard(){
  document.onkeydown = (e)=>{
    if(!document.getElementById("game")) return;
    const k = e.key;
    if(k === "Enter"){ if(G.selection.length) submitSelection(); e.preventDefault(); return; }
    if(k === "Backspace"){ G.selection.pop(); G.tapMode = G.selection.length>0; drawLine(); updateCenterBtn(); e.preventDefault(); return; }
    if(k === "Escape"){ clearSelection(); return; }
    const up = k.toUpperCase();
    // find first unused tile matching this letter
    for(let i=0;i<G.puzzle.letters.length;i++){
      if(G.puzzle.letters[i] === up && !G.selection.includes(i)){
        actx(); G.tapMode = true; G.selection.push(i); SFX.select(); drawLine(); updateCenterBtn();
        break;
      }
    }
  };
}

/* ---- restore previously found on re-entry ---- */
function restoreFound(){
  // fill grid cells for already-found answers
  for(const pl of G.grid.placements){
    if(G.foundAnswers.has(pl.word)){ pl.found = true; fillPlacement(pl, false); }
  }
  updateBonusCount();
}

/* ---- submit / evaluate ---- */
function submitSelection(){
  const word = currentWord();
  const b = document.getElementById("wordBubble");
  clearSelectionKeepBubble();
  if(word.length < 2){ clearSelection(); return; }

  if(G.puzzle.answers.includes(word)){
    if(G.foundAnswers.has(word)){ nudge(); return; }
    acceptAnswer(word);
  } else if(G.puzzle.bonusWords.includes(word)){
    if(G.foundBonus.has(word)){ nudge(); return; }
    acceptBonus(word);
  } else {
    // invalid
    b.classList.add("shake"); SFX.error();
    setTimeout(()=> b && b.classList.remove("shake"), 400);
    clearSelection();
  }
}
function clearSelectionKeepBubble(){
  G.selection = []; G.tapMode = false; G.moved = false; G.dragging = false;
  G.tileEls.forEach(t=> t && t.classList.remove("sel"));
  drawLineOnly();
  updateCenterBtn();
}
function drawLineOnly(){
  const svg = document.getElementById("lineCanvas"); if(svg) svg.innerHTML = "";
}

function nudge(){
  toast(STRINGS.umeshapata, "nudge"); SFX.nudge();
  const b = document.getElementById("wordBubble"); if(b){ b.classList.add("shake"); setTimeout(()=>b.classList.remove("shake"),400); }
  clearSelection();
}

function acceptAnswer(word){
  G.foundAnswers.add(word);
  const pl = G.grid.placements.find(p=> p.word === word && !p.found) || G.grid.placements.find(p=>p.word===word);
  if(pl) pl.found = true;
  const reward = CFG.answerCoins(pl ? pl.tiles.length : word.length);
  SFX.correct();
  toast(praise(), "");
  flyAndFill(pl, word);
  awardCoins(reward, "level_reward", {levelId: G.puzzle.levelId, word});
  persistFound();
  clearSelection();
}
function acceptBonus(word){
  G.foundBonus.add(word);
  const reward = CFG.bonusCoins(splitTiles(word, G.puzzle.letters).length);
  SFX.bonus();
  toast(STRINGS.neno_la_ziada(reward), "bonus");
  awardCoins(reward, "bonus", {levelId: G.puzzle.levelId, word});
  updateBonusCount();
  persistFound();
  clearSelection();
}

// Every coin the player gains goes through the ledger. `reason` is the
// ledger reason, so a later screen can break earnings down by source.
function awardCoins(n, reason, meta){
  // Replaying a cleared level pays nothing — otherwise the cheapest level
  // in the act is an unlimited coin faucet. See ECONOMY.REPLAY_PAYS_COINS.
  if(G && G.isReplay && !ECONOMY.REPLAY_PAYS_COINS) return;
  postLedger(n, reason || "level_reward", meta);
  refreshCoinHud(true);
  SFX.coin();
}

// Repaints any visible coin counter from the ledger balance.
function refreshCoinHud(pop){
  const box = document.getElementById("coinBox");
  const num = document.getElementById("coinNum");
  if(num) num.textContent = coins();
  if(pop && box){ box.classList.remove("coin-pop"); void box.offsetWidth; box.classList.add("coin-pop"); }
}

function updateBonusCount(){
  const c = document.getElementById("bonusCount");
  if(c) c.textContent = G.foundBonus.size;
}
function persistFound(){
  const rec = levelRecord(G.puzzle.levelId);
  rec.foundAnswers = [...G.foundAnswers];
  rec.foundBonus = [...G.foundBonus];
  saveState();
}

/* ---- fill a placement's cells (no animation) ---- */
function fillPlacement(pl, pop){
  pl.keys.forEach((k)=>{
    const cell = G.grid.cells.get(k);
    cell.filled = true;
    const ce = G.cellEls.get(k);
    if(ce){
      ce.textContent = cell.letter;
      if(pop){ ce.classList.remove("filled"); void ce.offsetWidth; }
      ce.classList.add("filled");
    }
  });
}

/* ---- flying letters animation then fill + completion check ---- */
function flyAndFill(pl, word){
  if(!pl){ checkComplete(); return; }
  const tiles = splitTiles(word, G.puzzle.letters);
  // map answer position -> screen source tile (best-effort by letter order)
  pl.keys.forEach((k, i)=>{
    const cell = G.grid.cells.get(k);
    const ce = G.cellEls.get(k);
    if(!ce) return;
    if(cell.filled){ return; } // crossing already filled
    // source: a wheel tile whose letter matches tiles[i]
    let srcIdx = -1;
    for(let s=0;s<G.puzzle.letters.length;s++){ if(G.puzzle.letters[s]===tiles[i]){ srcIdx = s; break; } }
    const srcEl = srcIdx>=0 ? G.tileEls[srcIdx] : null;
    const targetRect = ce.getBoundingClientRect();
    const startRect = srcEl ? srcEl.getBoundingClientRect() : targetRect;
    const fly = el(`<div class="fly">${cell.letter}</div>`);
    Object.assign(fly.style, {
      left: startRect.left + "px", top: startRect.top + "px",
      width: startRect.width + "px", height: startRect.height + "px",
      fontSize: (targetRect.width*0.5) + "px",
    });
    document.body.appendChild(fly);
    const dx = targetRect.left - startRect.left + (targetRect.width-startRect.width)/2;
    const dy = targetRect.top - startRect.top + (targetRect.height-startRect.height)/2;
    requestAnimationFrame(()=>{
      fly.style.transform = `translate(${dx}px,${dy}px) scale(${targetRect.width/startRect.width})`;
    });
    setTimeout(()=>{
      fly.remove();
      cell.filled = true;
      ce.textContent = cell.letter;
      ce.classList.add("filled");
    }, 480 + i*40);
  });
  setTimeout(()=> checkComplete(), 520 + pl.keys.length*40);
}

/* ---- hint ---- */
function useHint(){
  if(!canAfford(CFG.hintCost)){ toast(STRINGS.hakunaSarafu, "nudge"); SFX.error(); return; }
  // pick a random empty cell
  const empties = [...G.grid.cells.values()].filter(c=> !c.filled);
  if(!empties.length){ toast(STRINGS.hakunaKuonyesha, "nudge"); return; }
  postLedger(-CFG.hintCost, "hint", {levelId: G.puzzle.levelId});
  noteHintUsed();
  refreshCoinHud(false);
  const cell = empties[Math.floor(Math.random()*empties.length)];
  cell.filled = true; cell.hinted = true;
  const ce = G.cellEls.get(cell.r+","+cell.c);
  if(ce){ ce.textContent = cell.letter; ce.classList.add("filled","hinted"); }
  SFX.coin();
  // any answer now fully filled -> found
  for(const pl of G.grid.placements){
    if(!pl.found && pl.keys.every(k=> G.grid.cells.get(k).filled)){
      pl.found = true; G.foundAnswers.add(pl.word);
    }
  }
  persistFound(); saveState();
  checkComplete();
}

/* ---- bonus jar list ---- */
function openBonusJar(){
  const words = G.puzzle.bonusWords;
  const found = G.foundBonus;
  const items = words.map(w=> found.has(w)
    ? `<span>${w}</span>`
    : `<span class="miss">•••</span>`).join("");
  const body = found.size===0
    ? `<p>${STRINGS.bonusHakuna}</p>`
    : `<div class="bonuslist">${items}</div>`;
  openModal(`
    <h2>🫙 ${STRINGS.bonusJarTitle}</h2>
    <p style="font-weight:800;color:var(--orange)">${found.size} / ${words.length}</p>
    ${body}
    <div style="margin-top:16px"><button class="btn" data-close>${STRINGS.funga}</button></div>
  `);
}

/* ---- completion ---- */
function checkComplete(){
  if(!G || !G.grid.placements.every(p=> p.found)) return;
  if(G.completed) return;
  G.completed = true;
  const rec = levelRecord(G.puzzle.levelId);
  const firstTime = !rec.completed;
  rec.completed = true;
  persistFound();
  state.currentLevelId = Math.min(G.puzzle.levelId + 1, PUZZLES.length);

  // Only a first clear pays out and moves the matatu. A replay is recorded
  // (it is a scoreboard tiebreak) but changes nothing else.
  let departure = null;
  if(firstTime){
    // firstTime implies G.isReplay was false, so awardCoins will pay out.
    awardCoins(ECONOMY.LEVEL_COMPLETION_BONUS, "level_reward",
               {levelId: G.puzzle.levelId, completion: true});
    const {readyToDepart} = creditLevelToLeg();
    // The fare comes off here, on departure — not when the level ended.
    if(readyToDepart) departure = departToNextStop();
  } else {
    noteReplay();
  }
  saveState();

  setTimeout(()=>{
    if(departure) renderArrival(departure);
    else celebrate(G.puzzle, firstTime);
  }, 400);
}

function shareSafari(s){
  const url = location.href.split("#")[0];
  const text = STRINGS.shareText(s.furthestStopName, s.coinsRemaining, s.hintsUsed) + " " + url;
  const done = ()=> toast(STRINGS.shareNakala, "");
  if(navigator.share){
    navigator.share({title:STRINGS.gameTitle, text, url}).catch(()=>{ copyText(text, done); });
  } else { copyText(text, done); }
}
function copyText(text, cb){
  if(navigator.clipboard){ navigator.clipboard.writeText(text).then(cb, ()=>fallbackCopy(text,cb)); }
  else fallbackCopy(text, cb);
}
function fallbackCopy(text, cb){
  const ta = document.createElement("textarea"); ta.value = text; ta.style.position="fixed"; ta.style.opacity="0";
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand("copy"); }catch(e){}
  ta.remove(); cb && cb();
}

/* ======================================================================
   CONFETTI
   ====================================================================== */
function launchConfetti(){
  const layer = document.getElementById("confetti");
  const colors = ["#E63946","#FFB703","#2A9D8F","#1D3557","#F4802B","#fff"];
  for(let i=0;i<90;i++){
    const bit = document.createElement("div");
    bit.className = "confetti-bit";
    bit.style.left = Math.random()*100 + "vw";
    bit.style.background = colors[i % colors.length];
    bit.style.borderRadius = Math.random()<0.5 ? "2px" : "50%";
    layer.appendChild(bit);
    const dur = 1400 + Math.random()*1400;
    const rot = (Math.random()*720-360);
    bit.animate([
      {transform:`translateY(-20px) rotate(0deg)`, opacity:1},
      {transform:`translateY(105vh) rotate(${rot}deg)`, opacity:1},
    ], {duration:dur, easing:"cubic-bezier(.2,.6,.4,1)", delay:Math.random()*400, fill:"forwards"});
    setTimeout(()=> bit.remove(), dur+500);
  }
}

        <button class="icon-btn" id="bHome">🏠</button>
        <h2>${STRINGS.ubaoTitle}</h2>
        <div class="coins"><span class="c"></span><span>${coins()}</span></div>
      </div>
      <div class="boardwrap">
        <table class="btable">
          <thead><tr>
            <th></th><th>${STRINGS.mbaliZaidi}</th>
            <th class="num">💡</th><th class="num">🪙</th><th class="num">↺</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
        <p class="boardnote">
          Nafasi hupangwa kwa kituo cha mbali zaidi, kisha vidokezo vichache,
          kisha sarafu zilizobaki, kisha marudio machache.
        </p>
      </div>
    </div>`);
  node.querySelector("#bHome").onclick = renderHome;
  setScene(MAP_PHOTO, "map");
  show(node);
}

/* ======================================================================
   DEBUG PANEL — dev builds only.

   "Dev build" here means served from localhost / a file:// open, or
   explicitly switched on with ?debug=1. A production install from a real
   origin never mounts it.
   ====================================================================== */
function isDebugBuild(){
  if(location.search.includes("debug=1")) return true;
  const h = location.hostname;
  return h === "localhost" || h === "127.0.0.1" || h === "" || h.endsWith(".local");
}

function maybeMountDebug(){
  if(!isDebugBuild()) return;
  if(document.getElementById("debugFab")) return;
  const fab = el(`<button id="debugFab" title="Debug">🐞</button>`);
  fab.onclick = openDebugPanel;
  document.body.appendChild(fab);
}

function openDebugPanel(){
  const opts = STOPS.map((s,i)=>
    `<option value="${i}" ${i===SAVE.journey.stopIndex?"selected":""}>${i}. ${s.name}</option>`
  ).join("");
  const bal = DEBUG_API.verifyBalance();
  const ov = openModal(`
    <h2>🐞 Debug</h2>
    <div class="row"><span>Kituo</span>
      <select id="dbgStop" class="dbginput">${opts}</select></div>
    <div class="row"><span>Levels this leg</span>
      <strong>${SAVE.journey.levelsDoneThisLeg} / ${nextStop() ? nextStop().levelsToAdvance : "—"}</strong></div>
    <div class="row"><span>Sarafu</span>
      <input id="dbgCoins" class="dbginput" type="number" value="${coins()}"></div>
    <div class="row"><span>Ledger</span>
      <strong>${SAVE.ledger.length} entries</strong></div>
    <div class="row"><span>Balance check</span>
      <strong style="color:${bal.ok?'var(--green-d)':'var(--red)'}">
        ${bal.ok ? "✓ ledger = " + bal.derived : "✗ cache " + bal.cached + " vs " + bal.derived}
      </strong></div>
    <div class="row"><span>Save version</span><strong>v${SAVE.version}</strong></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:14px">
      <button class="btn sm" id="dbgApply">Apply</button>
      <button class="btn ghost sm" id="dbgDump">Dump</button>
      <button class="btn red sm" id="dbgReset">Reset save</button>
      <button class="btn ghost sm" data-close>${STRINGS.funga}</button>
    </div>
  `);
  ov.querySelector("#dbgApply").onclick = ()=>{
    DEBUG_API.jumpToStop(Number(ov.querySelector("#dbgStop").value));
    DEBUG_API.setBalance(Number(ov.querySelector("#dbgCoins").value));
    ov.remove(); renderMap();
  };
  ov.querySelector("#dbgDump").onclick = ()=>{ console.log(DEBUG_API.dump()); toast("Dumped to console",""); };
  ov.querySelector("#dbgReset").onclick = async ()=>{
    await resetJourney(); paintMatatu(); ov.remove(); renderHome();
  };
}

/* ======================================================================
   BOOT

   The save now lives in IndexedDB, so boot is async. Everything after
   loadJourney() runs against an in-memory save and writes behind, which
   keeps all the gameplay code synchronous.
   ====================================================================== */

// The matatu's name and paint are chosen once, on the first ever boot.
function paintMatatu(){
  if(!SAVE.profile.matatuName){
    SAVE.profile.matatuName = MATATU_NAMES[Math.floor(Math.random()*MATATU_NAMES.length)];
    SAVE.profile.skinIdx = Math.floor(Math.random()*MATATU_SKINS.length);
    persist();
  }
}

async function boot(){
  try{
    await loadJourney();
  }catch(e){
    // Storage is unavailable (private mode, quota, blocked). Play on with
    // an in-memory save rather than showing the player an error.
    console.warn("save unavailable, playing unsaved", e);
  }
  paintMatatu();
  renderHome();
}
boot();

// register service worker (ignored on file://, that's fine — game still works)
if("serviceWorker" in navigator && location.protocol.startsWith("http")){
  window.addEventListener("load", ()=> navigator.serviceWorker.register("sw.js").catch(()=>{}));
}
</script>
